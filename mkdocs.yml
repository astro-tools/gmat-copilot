site_name: gmat-copilot
site_description: Model-agnostic natural-language → GMAT mission-script generation, grounded and validated.
site_url: https://astro-tools.github.io/gmat-copilot/
repo_url: https://github.com/astro-tools/gmat-copilot
repo_name: astro-tools/gmat-copilot
edit_uri: edit/main/docs/

# The internal decision record and the prerequisite-spike artefacts are not part of the public site.
exclude_docs: |
  design/

theme:
  name: material
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Examples:
      - Draft a Hohmann transfer: examples/hohmann.md
      - Close the loop: examples/close-the-loop.md
      - Read the provenance: examples/read-the-provenance.md
      - Reproduce the eval: examples/reproduce-the-eval.md
      - Add a provider: examples/add-a-provider.md
      - Drive it from VS Code: examples/in-vscode.md
      - Reproduce a leaderboard entry: examples/reproduce-a-leaderboard-entry.md
  - Providers & auth: providers.md
  - Validation: validation.md
  - Repair loop: repair.md
  - Result schema: output-schema.md
  - Provenance: provenance.md
  - VS Code extension: vscode.md
  - Evaluation: evaluation.md
  - Leaderboard: leaderboard.md
  - Corpus & licences: corpus.md
  - API reference: api.md
  - Design:
      - Decisions: decisions.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            docstring_style: sphinx
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/astro-tools/gmat-copilot
