name: Feature request
description: Propose a new capability.
title: "<short summary>"
labels: ["type:feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What you want, in a sentence or two.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: The problem it solves or the workflow it enables.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we will know it is done.
      value: |
        - [ ]
        - [ ]
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope / non-goals
